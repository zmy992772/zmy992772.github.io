<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的在线状态</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 360px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .card h1 {
            font-size: 22px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }
        .status-item .badge {
            font-size: 14px;
            padding: 4px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            font-weight: 600;
        }
        .badge.online { background: #22c55e; color: #fff; }
        .badge.offline { background: #ef4444; color: #fff; }
        .time {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🟢 博主在线状态</h1>
        <div class="status-item">
            💻 电脑
            <span class="badge" id="pcBadge">加载中</span>
        </div>
        <div class="status-item">
            📱 手机
            <span class="badge" id="phoneBadge">加载中</span>
        </div>
        <div class="time" id="timeText">最后更新：--</div>
    </div>

    <script>
        fetch('https://raw.githubusercontent.com/zmy992772/zmy992772.github.io/main/data.json?t=' + Date.now())
            .then(res => res.json())
            .then(json => {
                const now = Date.now();
                const pcOnline = (now - json.pc * 1000) < 600000;
                const phoneOnline = (now - json.phone * 1000) < 600000;

                const pcBadge = document.getElementById('pcBadge');
                const phoneBadge = document.getElementById('phoneBadge');
                pcBadge.textContent = pcOnline ? '在线' : '离线';
                pcBadge.className = 'badge ' + (pcOnline ? 'online' : 'offline');
                phoneBadge.textContent = phoneOnline ? '在线' : '离线';
                phoneBadge.className = 'badge ' + (phoneOnline ? 'online' : 'offline');

                document.getElementById('timeText').textContent = '最后更新：' + new Date().toLocaleString();
            })
            .catch(() => {
                document.getElementById('pcBadge').textContent = '加载失败';
            });
    </script>
</body>
</html>
